# CodeQL Analysis - Automated code scanning for security vulnerabilities
# https://docs.github.com/en/code-security/code-scanning
# Finds security vulnerabilities and coding errors in your codebase.

name: "CodeQL"

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  schedule:
    # Run weekly on Wednesday at 00:00 UTC
    - cron: '0 0 * * 3'

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: ['python']

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@f35333b910470a5408cb081b68f0701254a7d27b # v3.28.18
        with:
          languages: ${{ matrix.language }}
          # Use extended queries for more thorough analysis
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@f35333b910470a5408cb081b68f0701254a7d27b # v3.28.18

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@f35333b910470a5408cb081b68f0701254a7d27b # v3.28.18
        with:
          category: "/language:${{ matrix.language }}"
